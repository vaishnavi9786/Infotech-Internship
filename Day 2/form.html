<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration Form</title>
<link rel="stylesheet" href="form.css">
</head>
<body>

<h2>Student Registration Form</h2>

<form onsubmit="return showPopup();">

    <label>Roll Number:</label>
    <input type="text" id="roll" name="roll" required><br><br>

    <label>Student Name:</label>
    <input type="text" id="name" name="name" required><br><br>

    <label>Father Name:</label>
    <input type="text" id="fatherName" name="fatherName" required><br><br>

    <label>Date of Birth:</label>
    <input type="date" id="dob" name="dob" required><br><br>

    <label>Mobile Number:</label>
    <input type="text" id="mobile" name="mobile" required><br><br>

    <label>Email ID:</label>
    <input type="email" id="email" name="email"><br><br>

    <label>Password:</label>
    <input type="password" id="password" name="password" required><br><br>

    <label>Gender:</label><br>
    <div class="radio-group">
        <input type="radio" name="gender" value="male" required> Male
        <input type="radio" name="gender" value="female" required> Female
        <input type="radio" name="gender" value="other" required> Other
    </div>
    <br>

    <label>Department:</label><br>
    <div class="radio-group">
        <input type="radio" name="department" value="CSE" required> CSE
        <input type="radio" name="department" value="IT" required> IT
        <input type="radio" name="department" value="ECE" required> ECE
        <input type="radio" name="department" value="Civil" required> Civil
        <input type="radio" name="department" value="Mechanical" required> Mechanical
    </div>
    <br>

    <label>Course:</label>
    <select id="course" name="course" required>
        <option value="">Select Course</option>
        <option value="B.Tech">B.Tech</option>
        <option value="M.Tech">M.Tech</option>
        <option value="BCA">BCA</option>
        <option value="MCA">MCA</option>
    </select><br><br>

    <label>Student Photo:</label>
    <input type="file" id="photo" name="photo" required><br><br>

    <label>City:</label>
    <input type="text" id="city" name="city" required><br><br>

    <label>Address:</label>
    <textarea rows="4" cols="50" name="address" required></textarea><br><br>

    <input type="submit" value="Register" class="submit-btn">
</form>
<script>
function showPopup() {
    alert("Registration Successful!");
    return true;
}
</script>

</body>
</html>
